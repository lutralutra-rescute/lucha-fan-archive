<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Lucha 露洽官方後援會 - 存檔區</title>
    <style>
        /* 全域設定：冷色系背景與字體 */
        body {
            background-color: #eef2f5; /* 輕微的冷灰色調 */
            color: #2c3e50; /* 深藍灰色文字 */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column; /* 讓內容與隱藏連結垂直排列 */
            align-items: center;    /* 水平置中 */
        }
        
        /* 網站容器 */
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border: 1px solid #dcdde1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #34495e;
            border-bottom: 2px solid #3498db; /* 藍色裝飾線 */
            padding-bottom: 10px;
            font-size: 24px;
        }

        .announcement {
            margin-top: 20px;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 隱藏區塊設定：顏色與背景相同，實現隱形效果 */
        .hidden-truth {
            margin-top: 30px;
            text-align: center;
        }

        .hidden-truth a {
            color: #eef2f5; /* 隱藏關鍵：與背景色一致 */
            font-size: 12px;
            transition: color 0.3s;
        }

        /* 滑鼠經過時浮現 */
        .hidden-truth a:hover {
            color: #bdc3c7; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>【重要公告】關於露洽Lucha的無限期暫停活動</h1>
        <div class="announcement">
            <p>日期：2026年XX月XX日</p>
            <p>致各位支持者：</p>
            <p>由於近期突發狀況，經與營運團隊討論後，決定即日起暫時切斷所有網路連接，進入無限期休息狀態。感謝大家長久以來的支持。</p>
            <p>——後援會會長</p>
        </div>
    </div>

    <!-- 隱藏在背景中的連結 -->
    <div class="hidden-truth">
        <a href="secret.html">...聆聽裂痕...</a>
    </div>

</body>
</html>
