<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>活動紀錄 | Lucha 官方後援會</title>
    <style>
        body { background-color: #eef2f5; color: #2c3e50; font-family: sans-serif; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; width: 100%; max-width: 700px; padding: 40px; border: 1px solid #dcdde1; }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 24px; color: #34495e; }
        
        .log-item { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .date { font-weight: bold; color: #34495e; display: inline-block; width: 120px; }
        
        /* 隱藏區塊預設樣式 */
        .hidden-glitch { display: none; }
        .glitch-link { color: #888; font-style: italic; text-decoration: none; }
        .glitch-link:hover { color: #e74c3c; text-decoration: underline; }

        /* 裏版模式觸發後的樣式 */
        .glitch-mode .normal-item { text-decoration: line-through; opacity: 0.5; }
        .glitch-mode .hidden-glitch { display: block; color: #c0392b; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>活動紀錄</h1>
        
        <div class="log-item normal-item">
            <span class="date">2026/03/14</span> 3D大型公演「Guns & Roses」
        </div>
        
        <div class="log-item normal-item">
            <span class="date">2026/04/01</span> 多重宇宙紀念直播
        </div>

        <div class="log-item hidden-glitch">
            <span class="date">2026/06/07</span> [系統異常] 聆聽原始訊號
            <a href="你的YT連結" class="glitch-link">...這不是直播...</a>
        </div>
    </div>

    <script>
        // 自動偵測網址參數，若有 ?mode=glitch 則套用裏版模式
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'glitch') {
            document.body.classList.add('glitch-mode');
            document.title = "【錯誤】訪問被拒";
        }
    </script>
</body>
</html>
