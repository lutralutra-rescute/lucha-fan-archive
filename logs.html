<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>活動紀錄 | Lucha 官方後援會</title>
    <style>
        body { background-color: #eef2f5; color: #2c3e50; font-family: sans-serif; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; width: 100%; max-width: 700px; padding: 40px; border: 1px solid #dcdde1; }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 24px; }
        
        /* 活動清單風格 */
        .log-item { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .date { font-weight: bold; color: #34495e; display: inline-block; width: 120px; }
        
        /* 隱藏的崩壞連結風格 */
        .glitch-link { color: #888; font-style: italic; }
        .glitch-link:hover { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>活動紀錄</h1>
        
        <div class="log-item">
            <span class="date">2026/03/14</span> 3D大型公演「Guns & Roses」
        </div>
        
        <div class="log-item">
            <span class="date">2026/04/01</span> 多重宇宙紀念直播
        </div>

        <!-- 這裡開始進入「異常期」 -->
        <div class="log-item">
            <span class="date">2026/05/XX</span> 秘密錄音測試 
            <a href="https://youtube.com/..." class="glitch-link">[查看備份]</a>
        </div>

        <div class="log-item">
            <span class="date">2026/06/XX</span> [數據損毀] 
            <span class="glitch-link">連結已失效...</span>
        </div>
    </div>

</body>
</html>
